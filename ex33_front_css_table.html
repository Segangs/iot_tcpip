<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            border-collapse: collapse;
            caption-side: bottom;
            border:1px solid black;
            min-width: 200px;
            border-spacing: 20px;
        }
        td, th{
            border:1px solid black;
        }
    </style>
</head>
<body>
    <table>
        <caption>표1. 테스트용 표</caption>
        <thead>
            <tr>
                <th>컬럼1</th>
                <th>컬럼2</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>내용1</td>
                <td>내용2</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
