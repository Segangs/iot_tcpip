<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {margin: 0px;}
        .my-header, .my-footer{
            background-color: #6699db;
            height:100px;
            text-align:center;
        }
        .container{
            background-color:orange;
            display:flex;
            flex-direction: row;
            margin:auto;
        }
        .flex-item{
            background-color: yellow;
            margin:10px auto; padding:10px; width:150px;
            border-radius: 10px; height:100px;
        }
        @media (max-width:500px){
            .container{flex-direction: column;}
        }
    </style>
</head>
<body>
    <div class="my-header">검색창</div>
    <div class="container">
        <div class="flex-item">컨텐츠 박스 1</div>
        <div class="flex-item">컨텐츠 박스 2</div>
        <div class="flex-item">컨텐츠 박스 3</div>
        <div class="flex-item">컨텐츠 박스 4</div>
    </div>
    <div class="my-footer">회사소개</div>
</body>
</html>
