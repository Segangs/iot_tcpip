<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container {
            width: 800px;
            height: 200px;
            margin: auto;
            background-color: lemonchiffon;
        }

        .origin {
            width: 100px;
            height: 100px;
            margin: 50px;
            border: 1px solid black;
            float: left
        }

        .origin div {
            width: 100px;
            height: 100px;
            background-color: orange;
        }

        #movex:hover {
            transform: translateX(50px);
        }

        #movey:hover {
            transform: translateY(50px);
        }

        #movexy:hover {
            transform: translate(50px, 50px);
        }
    </style>
</head>

<body>
    <div id="container">
        <div class="origin">
            <div id="movex">item 1</div>
        </div>
        <div class="origin">
            <div id="movey">item 2</div>
        </div>
        <div class="origin">
            <div id="movexy">item 3</div>
        </div>
    </div>
</body>

</html>
