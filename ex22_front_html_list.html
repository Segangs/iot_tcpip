<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메인</title>
</head>
<body>
   <h1>Ordered List - OL : 내가 좋아하는 야식 순위</h1>
   <ol>
    <li>치킨</li>
    <li>생라면</li>
    <li>썬칩</li>
   </ol>

   <h1>UnOrdered List - UL : 내 친구들</h1>
   <ul>
    <li>뽀로로</li>
    <li>크롱</li>
    <li>패티</li>
   </ul>
</body>
</html>
