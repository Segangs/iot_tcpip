{% extends 'base.html' %}

{% block title %}Books{% endblock %}
{% block content %}
<h2>전체 도서 목록</h2>
<div id="booklist"> 도서 목록을 로딩 중입니다...</div>
<script>
    async function loadBooks() {
        const res = await fetch('/api/books');
        const books = await res.json();

        if (books.length === 0) {
            document.getElementById('bookList').innerHTML = '<p>등록 도서 없음</p>';
            return;
        }

        // 가져온 DB수 만큼 여러번 그림
        document.getElementById('bookList').innerHTML = books.map(book => `
            <div>
                <div style="
                    display: flex;
                    justify-content:space-between; align-items:center;">
                    <strong>${book.bookname}</strong>
                    <span style="color:#777777">(출판사: ${book.publisher})</span>
                    <div>${book.price}원</div>
                </div>
                    <button onclick="orderBook(${Book.bookid}, ${book.price})">주문하기</button>
            </div>
        `).join('');

    }

    async function orderBook(bookid, price) {
        if (!confirm('이 도서를 주문하시겠습니까?')) return;
        const res = await fetch('/api/order',
            {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ bookid, price })
            }
        );
        if (res.ok) {
            alert('주문 완료'); location.href = '/my_orders';
        } else {
            alert('주문 실패')
        }
    }
    loadBooks();
</script>







{% endblock %}
