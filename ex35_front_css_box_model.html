<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box1{
            width: 100px; height:100px; background-color: yellow;
            margin:50px;
        }
        .box2{
            width: 100px; height:100px; background-color: rgb(14, 188, 211);
            margin:50px 50px 100px 50px;
        }
    </style>
</head>
<body>
    <p>content-box vs border-box</p>
    <div style="margin:10px; border:5px solid black; padding:20px; width:300px; height:100px;">박스 테스트</div>
    <div style="margin:10px; border:5px solid black; padding:20px; width:300px; height:100px; box-sizing:border-box">박스 테스트</div>
    <!-- 
    <div style="border:solid black; margin:10px; width:300px; height:100px; border-width:5px 10px 20px 30px;"> 5 10 20 30 순서 </div>
    <div style="border:solid black; margin:10px; width:300px; height:100px; border-width:5px 30px;"> 5 30 순서 </div>
    <div style="border:solid black; margin:10px; width:300px; height:100px; border-width:5px 20px 30px;"> 5 20 30 순서 </div> 
    -->
    
    <div style="height: 200px; background-color: brown;">
        <div style="width: 100px; height:100px; background-color: blue; margin: auto;"></div>
    </div>

    <p>margin 중첩 : margin 50 씩 줬으나 노란색 박스 간격이 중첩됨</p>
    <div class="box1"></div>
    <div class="box1"></div>
    <div class="box1"></div>

    <p>margin 중첩 방지 : margin 을 50px 50px 100px 50px 처럼 따로 준다</p>
    <div class="box2"></div>
    <div class="box2"></div>
    <div class="box2"></div>


</body>
</html>
